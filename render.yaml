# Render Blueprint (https://render.com)
# 사용법: Render 대시보드 → New + → Blueprint → 이 저장소(pingpong-server) 선택 → Apply.
#
# 핵심 전제: 방 상태를 "서버 메모리"에 둔다 → 반드시 단일 인스턴스(free/starter)로,
#           오토스케일/멀티 인스턴스 금지. 여러 인스턴스면 방이 인스턴스별로 갈려 매칭이 깨진다.
# 참고: 무료 플랜은 일정 시간 미사용 시 슬립 → 첫 접속에 30~60초 콜드스타트 지연이 생길 수 있다.
services:
  - type: web
    name: pingpong-server
    runtime: node
    plan: free
    region: singapore # 한국에서 가까운 리전. 필요시 변경.
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22"
